name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The shared-corpus highlighter conformance tests read inputs from the
          # `spec` submodule (markup-carve/carve), so it must be checked out.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew --no-daemon buildPlugin

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Verify plugin structure
        run: ./gradlew --no-daemon verifyPlugin

      - name: Run Plugin Verifier
        run: ./gradlew --no-daemon runPluginVerifier

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: intellij-carve
          path: build/distributions/*.zip
          if-no-files-found: error

  # The `test` task above forks on the IDE's bundled JBR, so it only ever exercises that
  # one JDK. The live preview runs GraalJS, and Truffle breaks on newer JDKs (23.0.2 called
  # sun.misc.Unsafe.ensureClassInitialized, removed in JDK 24+) - which shipped to users
  # with a green build. Boot a polyglot context on the JDKs users actually run.
  graal-jdk-smoke:
    name: GraalJS boots on JDK ${{ matrix.jdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['21', '24']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            ${{ matrix.jdk }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Boot GraalJS on JDK ${{ matrix.jdk }}
        run: ./gradlew --no-daemon graalSmoke -PgraalSmokeJdk=${{ matrix.jdk }}
